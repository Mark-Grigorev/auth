name: CI/CD Pipeline

on: 
  push:
    branches: ["main", "feature*"]
    tags: ['v*']
  pull_request:
    branches: ["main", "feature*"]
    
env:
  GO_VERSION: '1.24.6'
  ALPINE_VERSION: '3.20'
  PORT: '80'
  LINTER_VERS: 'v1.64.8'
  UBUNTU_VERS: '22.04'

jobs:
  ci:
    uses: Mark-Grigorev/central-ci-cd/.github/workflows/go-ci-complete.yml@main
    with:
      go-version: '1.24.6'
      linter-version: 'v1.64.8'
      ubuntu-version: '22.04'
